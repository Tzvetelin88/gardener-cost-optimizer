name: gardener-cost-optimizer

services:
  smart-cost-optimizer-api:
    container_name: gardener-cost-optimizer-api
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      API_ADDR: :8080
      DATA_SOURCE: mock
      ENABLE_FALLBACK_DATA: "true"
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  smart-cost-optimizer-frontend:
    container_name: gardener-cost-optimizer-frontend
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: /api/v1
    ports:
      - "5173:80"
    depends_on:
      smart-cost-optimizer-api:
        condition: service_healthy
